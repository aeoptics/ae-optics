<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ae optics — مساعد العدسات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --brand:#414141;--cream:#EFE9C8;--cream2:#F7F4E8;--cream3:#D8D0A0;
  --bg:#F5F4F0;--card:#FFF;--bdr:#E4E1D6;
  --t1:#1A1A1A;--t2:#5A5A5A;--t3:#9A9A9A;
  --green:#1D9E75;--glt:#E1F5EE;
  --amber:#8A5200;--alt:#FFF0D0;
  --wa:#25D366;--r14:14px;--r10:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Cairo',sans-serif;background:var(--brand);}

/* ── CRITICAL FIX: force LTR for slide container ── */
#po{width:100%;height:100vh;overflow:hidden;position:relative;}
#pi{
  display:flex;height:100%;
  direction:ltr; /* MUST be LTR — RTL reverses flex and breaks sliding */
  transition:transform .42s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}

/* ── panels ── */
.pnl{
  min-width:100vw;width:100vw;height:100vh;
  overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
  direction:rtl; /* restore RTL for content */
  -webkit-overflow-scrolling:touch;
}
.pnl-dk{background:var(--brand);}

/* ── header ── */
.hdr{
  background:var(--brand);padding:13px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;flex-shrink:0;
  direction:rtl;
}
.hdr-back{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .14s;
}
.hdr-back:active{background:rgba(255,255,255,.18);}
.hdr-step{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.04em;}

/* ── welcome ── */
.w-in{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:36px 28px;text-align:center;
}
.w-tag{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--cream3);text-transform:uppercase;margin-bottom:16px;}
.w-ttl{font-size:25px;font-weight:900;color:var(--cream);line-height:1.38;margin-bottom:11px;}
.w-sub{font-size:13px;color:rgba(239,233,200,.5);line-height:1.75;margin-bottom:34px;max-width:290px;}
.w-feats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;}
.w-feat{
  display:flex;align-items:center;gap:5px;
  background:rgba(239,233,200,.1);border:1px solid rgba(239,233,200,.13);
  border-radius:20px;padding:5px 12px;
  font-size:11px;color:rgba(239,233,200,.68);font-weight:600;
}
.btn-start{
  width:100%;max-width:270px;padding:17px;
  border-radius:var(--r14);border:none;
  background:var(--cream);color:var(--brand);
  font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:transform .13s,background .13s;
}
.btn-start:active{transform:scale(.97);background:var(--cream2);}

/* ── question body ── */
.q-bd{flex:1;display:flex;flex-direction:column;padding:18px 17px 30px;}
.q-prog{margin-bottom:18px;}
.q-pr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.q-pr-lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.05em;}
.q-pr-pct{font-size:11px;font-weight:800;color:var(--green);}
.q-pr-bar{height:3px;background:var(--bdr);border-radius:3px;overflow:hidden;}
.q-pr-fill{height:100%;background:var(--green);border-radius:3px;transition:width .5s ease;}
.q-chip{display:inline-block;font-size:10px;font-weight:800;background:var(--cream2);color:var(--brand);padding:4px 11px;border-radius:20px;letter-spacing:.06em;margin-bottom:10px;}
.q-txt{font-size:17px;font-weight:800;color:var(--t1);line-height:1.45;margin-bottom:5px;}
.q-sub{font-size:12px;color:var(--t3);line-height:1.6;margin-bottom:18px;}
.med-box{background:var(--alt);border:1px solid #F5C878;border-radius:var(--r10);padding:11px 13px;margin-top:14px;display:flex;gap:9px;align-items:flex-start;}
.med-txt{font-size:12px;color:var(--amber);line-height:1.65;font-weight:600;}

/* ── options ── */
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{
  display:flex;align-items:center;gap:11px;
  padding:13px 14px;border:1.5px solid var(--bdr);
  background:var(--card);border-radius:var(--r14);
  cursor:pointer;text-align:right;
  transition:border-color .13s,background .13s,transform .1s;
  position:relative;
}
.opt:active{transform:scale(.984);}
.opt.sel{border-color:var(--green);background:var(--glt);}
.opt.dis{opacity:.38;pointer-events:none;}
.oi{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ob{flex:1;}
.ot{font-size:13.5px;font-weight:700;color:var(--t1);display:block;line-height:1.3;}
.oh{font-size:11px;color:var(--t3);display:block;margin-top:3px;line-height:1.45;}
.ock{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.opt.sel .ock{background:var(--green);border-color:var(--green);}
.ockd{width:7px;height:7px;border-radius:50%;background:#fff;opacity:0;transform:scale(0);transition:all .11s;}
.opt.sel .ockd{opacity:1;transform:scale(1);}
.soon{position:absolute;top:-1px;left:-1px;background:var(--alt);color:var(--amber);font-size:9px;font-weight:800;padding:3px 8px;border-radius:var(--r14) 0 var(--r10) 0;}

/* ── brand grid ── */
.brd-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.brd-opt{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 10px;border:1.5px solid var(--bdr);
  background:var(--card);border-radius:var(--r14);
  cursor:pointer;text-align:center;
  transition:border-color .13s,background .13s,transform .1s;gap:7px;
}
.brd-opt:active{transform:scale(.97);}
.brd-opt.sel{border-color:var(--green);background:var(--glt);}
.brd-ico{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;letter-spacing:-.5px;
}
.brd-nm{font-size:12px;font-weight:700;color:var(--t1);line-height:1.2;}
.brd-sb{font-size:10px;color:var(--t3);margin-top:-2px;}
.brd-opt.sel .brd-ico{filter:brightness(1.05);}

/* ── result ── */
.res-hero{background:var(--brand);padding:22px 20px 26px;flex-shrink:0;}
.res-top{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--cream3);text-transform:uppercase;margin-bottom:10px;}
.res-brpill{display:inline-flex;align-items:center;gap:5px;background:rgba(239,233,200,.12);border:1px solid rgba(239,233,200,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(239,233,200,.68);font-weight:700;margin-bottom:10px;}
.res-nm{font-size:19px;font-weight:900;color:var(--cream);line-height:1.35;margin-bottom:4px;}
.res-sb{font-size:12px;color:rgba(239,233,200,.46);margin-bottom:14px;}
.res-tags{display:flex;flex-wrap:wrap;gap:6px;}
.rtag{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(239,233,200,.13);color:var(--cream);border:1px solid rgba(239,233,200,.18);}
.res-body{padding:16px 17px 0;display:flex;flex-direction:column;gap:13px;}
.inf-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r14);padding:15px 17px;}
.inf-lbl{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.06em;margin-bottom:7px;}
.inf-txt{font-size:13px;color:var(--t2);line-height:1.82;}
.alt-row{background:var(--card);border:1px dashed var(--bdr);border-radius:var(--r10);padding:12px 15px;display:flex;align-items:center;gap:10px;}
.alt-ico{width:30px;height:30px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.alt-l{font-size:10px;color:var(--t3);margin-bottom:2px;}
.alt-n{font-size:12.5px;font-weight:700;color:var(--t1);}
.sum-card{background:var(--cream2);border:1px solid var(--bdr);border-radius:var(--r14);padding:14px 17px;}
.sum-l{font-size:10px;font-weight:800;color:var(--brand);letter-spacing:.06em;margin-bottom:9px;}
.sum-items{display:flex;flex-direction:column;gap:5px;}
.sum-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--t2);line-height:1.5;}
.sum-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;}
.amb-note{background:var(--alt);border:1px solid #F5C878;border-radius:var(--r10);padding:12px 15px;display:flex;gap:9px;}
.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;padding:16px;border-radius:var(--r14);border:none;
  background:var(--wa);color:#fff;
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;box-shadow:0 5px 18px rgba(37,211,102,.25);
  transition:transform .13s;
}
.btn-wa:active{transform:scale(.97);}
.btn-rst{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:13px;border-radius:var(--r10);
  border:1.5px solid var(--bdr);background:transparent;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--t3);
  cursor:pointer;
}
</style>
</head>

/* ══════════════════════════════════
   SLIDE ENGINE
══════════════════════════════════ */
function slideTo(idx){
  document.getElementById('pi').style.transform='translateX('+(-idx*100)+'vw)';
}

function pushPnl(el,qId){
  var pi=document.getElementById('pi');
  pi.appendChild(el);
  navStack.push({el:el,qId:qId});
  slideTo(navStack.length-1);
  setTimeout(function(){el.scrollTop=0;},430);
}

function goBack(){
  if(navStack.length<=1)return;
  var cur=navStack.pop();
  /* undo scores */
  var qId=cur.qId;
  if(qId&&Q[qId]&&answers[qId]!==undefined){
    var op=Q[qId].opts[answers[qId]];
    if(op&&op.sc)Object.keys(op.sc).forEach(function(k){scores[k]=Math.max(0,(scores[k]||0)-op.sc[k]);});
    delete answers[qId];
  }
  slideTo(navStack.length-1);
  setTimeout(function(){if(cur.el.parentNode)cur.el.parentNode.removeChild(cur.el);},450);
}

/* ══════════════════════════════════
   BUILD WELCOME
══════════════════════════════════ */
function mkWelcome(){
  var p=document.createElement('div');
  p.className='pnl pnl-dk';p.setAttribute('data-qid','_welcome');
  p.innerHTML=
    '<div class="hdr" style="justify-content:center;">'+LHDR+'</div>'+
    '<div class="w-in">'+
      '<div style="margin-bottom:26px;">'+LBIG+'</div>'+
      '<p class="w-tag">مساعد اختيار العدسات</p>'+
      '<h1 class="w-ttl">عدستك المثالية<br/>بدقة طبية</h1>'+
      '<p class="w-sub">أسئلة طبية مدروسة تحدد العدسة الأنسب لعمرك واحتياجك وماركتك المفضلة</p>'+
      '<div class="w-feats">'+
        feat('تشخيص طبي دقيق')+feat('دقيقتان فقط')+feat('توصية شخصية')+
      '</div>'+
      '<button class="btn-start" onclick="startFunnel()">ابدأ التشخيص ←</button>'+
    '</div>';
  return p;
}
function feat(t){return '<span class="w-feat"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 6l3 3 7-7"/></svg>'+t+'</span>';}

/* ══════════════════════════════════
   BUILD QUESTION PANEL
══════════════════════════════════ */
function mkQPnl(qId){
  stepNum++;
  var q=Q[qId];
  var pct=Math.round(((stepNum-1)/TOTAL)*100);
  var optsH='';

  if(q.isBrand){
    optsH='<div class="brd-grid">';
    q.opts.forEach(function(o,i){
      var br=BRANDS[o.bk]||BRANDS.unk;
      optsH+='<div class="brd-opt" id="bo_'+qId+'_'+i+'" onclick="pickBrand(\''+qId+'\','+i+',this)">'+
        '<div class="brd-ico" style="background:'+br.bg+';color:'+br.co+'">'+br.ab+'</div>'+
        '<span class="brd-nm">'+o.t+'</span>'+
        (br.sb?'<span class="brd-sb">'+br.sb+'</span>':'')+
      '</div>';
    });
    optsH+='</div>';
  } else {
    optsH='<div class="opts">';
    q.opts.forEach(function(o,i){
      var dc=o.dis?' dis':'';
      var sl=o.dis?'<span class="soon">'+o.disLbl+'</span>':'';
      var oc=o.dis?'':'onclick="pickOpt(\''+qId+'\','+i+',this)"';
      optsH+='<div class="opt'+dc+'" '+oc+'>'+sl+
        mkIco(o.ico)+
        '<div class="ob"><span class="ot">'+o.t+'</span>'+(o.h?'<span class="oh">'+o.h+'</span>':'')+'</div>'+
        '<div class="ock"><div class="ockd"></div></div>'+
      '</div>';
    });
    optsH+='</div>';
  }

  var p=document.createElement('div');
  p.className='pnl';p.setAttribute('data-qid',qId);
  p.innerHTML=
    '<div class="hdr">'+
      '<div class="hdr-back" onclick="goBack()">'+
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EFE9C8" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</div>'+
      LHDR+
      '<span class="hdr-step">'+stepNum+'/'+TOTAL+'</span>'+
    '</div>'+
    '<div class="q-bd">'+
      '<div class="q-prog">'+
        '<div class="q-pr-row"><span class="q-pr-lbl">'+q.cat+'</span><span class="q-pr-pct">'+pct+'%</span></div>'+
        '<div class="q-pr-bar"><div class="q-pr-fill" style="width:'+pct+'%"></div></div>'+
      '</div>'+
      '<span class="q-chip">'+q.cat+'</span>'+
      '<p class="q-txt">'+q.txt+'</p>'+
      (q.sub?'<p class="q-sub">'+q.sub+'</p>':'')+
      optsH+
      '<div id="mn_'+qId+'"></div>'+
    '</div>';
  return p;
}

/* ══════════════════════════════════
   PICK HANDLERS
══════════════════════════════════ */
function pickOpt(qId,oi,el){
  var q=Q[qId]; var opt=q.opts[oi];
  /* visual */
  el.parentElement.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  /* score: deduct old if re-picking */
  if(answers[qId]!==undefined){
    var old=q.opts[answers[qId]];
    if(old&&old.sc)Object.keys(old.sc).forEach(function(k){scores[k]=Math.max(0,(scores[k]||0)-old.sc[k]);});
  }
  answers[qId]=oi;
  if(opt.sc)Object.keys(opt.sc).forEach(function(k){scores[k]=(scores[k]||0)+opt.sc[k];});
  /* med note */
  if(opt.med){
    var ne=document.getElementById('mn_'+qId);
    if(ne)ne.innerHTML='<div class="med-box"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A5200" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><p class="med-txt">'+opt.med+'</p></div>';
  }
  setTimeout(function(){
    if(opt.nx==='result')mkResult();
    else if(opt.nx){var p=mkQPnl(opt.nx);pushPnl(p,opt.nx);}
  },380);
}

function pickBrand(qId,oi,el){
  var q=Q[qId]; var opt=q.opts[oi];
  el.parentElement.querySelectorAll('.brd-opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  /* score: deduct old */
  if(answers[qId]!==undefined){
    var old=q.opts[answers[qId]];
    if(old&&old.sc)Object.keys(old.sc).forEach(function(k){scores[k]=Math.max(0,(scores[k]||0)-old.sc[k]);});
  }
  answers[qId]=oi;
  if(opt.sc)Object.keys(opt.sc).forEach(function(k){scores[k]=(scores[k]||0)+opt.sc[k];});
  setTimeout(function(){
    if(opt.nx==='result')mkResult();
    else if(opt.nx){var p=mkQPnl(opt.nx);pushPnl(p,opt.nx);}
  },340);
}

/* ══════════════════════════════════
   START
══════════════════════════════════ */
function startFunnel(){
  navStack=[];answers={};scores={};stepNum=0;
  var pi=document.getElementById('pi');
  while(pi.children.length>1)pi.removeChild(pi.lastChild);
  /* re-add welcome to navStack */
  navStack.push({el:pi.children[0],qId:'_welcome'});
  var p=mkQPnl('q_age');
  pushPnl(p,'q_age');
}

/* ══════════════════════════════════
   RESULT
══════════════════════════════════ */
function mkResult(){
  /* medical adjustments */
  var ageA=answers['q_age'];
  var degA=answers['q_degree'];
  var frA=answers['q_frame'];
  var brA=answers['q_brand'];
  var brOpt=Q['q_brand'].opts[brA];
  var brKey=brOpt?brOpt.bk:'unk';

  if(ageA===0){scores['eyezenR']=0;}
  if(ageA===0&&answers['q_young_use']===2){scores['stdAR']=(scores['stdAR']||0)+2;scores['eyezenR']=0;}
  if(degA===0){scores['hi74']=0;scores['hi67']=0;}
  if(degA===1){scores['hi74']=0;}
  if(frA===1){scores['trivex']=(scores['trivex']||0)+3;if(degA>=1)scores['hi74']=(scores['hi74']||0)+1;if(degA===1)scores['hi67']=(scores['hi67']||0)+1;}
  if(ageA===2&&answers['q_senior_use']===1){scores['eyezenR']=(scores['eyezenR']||0)+4;}

  var keys=Object.keys(L).sort(function(a,b){return(scores[b]||0)-(scores[a]||0);});
  var pK=keys[0],aK=keys[1];
  var pL=L[pK],aL=L[aK];
  var br=BRANDS[brKey]||BRANDS.unk;

  /* brand line */
  var brLine=brKey!=='unk'?
    '<div class="res-brpill"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>تستخدم '+br.nm+' حالياً</div>':'';

  /* ── معامل الانكسار بناءً على الدرجة والإطار ── */
  var idxData={val:'',label:'',note:'',color:'#1A3A6B',bg:'#E6F1FB'};
  var rimless=(frA===1);
  if(rimless){
    /* إطار مفتوح — Trivex أو polycarbonate بغض النظر عن الدرجة */
    if(degA===0)      idxData={val:'Trivex / 1.60 PC',label:'معامل الانكسار الموصى به',note:'الإطار المفتوح يستوجب عدسة مقاومة للكسر (Trivex أو Polycarbonate)',color:'#0F6E56',bg:'#E1F5EE'};
    else if(degA===1) idxData={val:'Trivex / 1.67',   label:'معامل الانكسار الموصى به',note:'للدرجات المتوسطة مع إطار مفتوح: Trivex للمتانة أو 1.67 للرقة',   color:'#0F6E56',bg:'#E1F5EE'};
    else              idxData={val:'Trivex / 1.74',   label:'معامل الانكسار الموصى به',note:'للدرجات العالية مع إطار مفتوح: Trivex للمتانة أو 1.74 للرقة القصوى',color:'#0F6E56',bg:'#E1F5EE'};
  } else {
    /* إطار كامل */
    if(degA===0)      idxData={val:'1.50 (Standard)',label:'معامل الانكسار الموصى به',note:'الدرجة الخفيفة — العدسة القياسية كافية تماماً وبتكلفة مناسبة',color:'#1A3A6B',bg:'#E6F1FB'};
    else if(degA===1) idxData={val:'1.67 High-Index', label:'معامل الانكسار الموصى به',note:'للدرجات المتوسطة — أقل سُمكاً وأخف وزناً من 1.50 بشكل ملحوظ',  color:'#1A3A6B',bg:'#E6F1FB'};
    else              idxData={val:'1.74 High-Index', label:'معامل الانكسار الموصى به',note:'للدرجات العالية — أرق عدسة متاحة في السوق للدرجات فوق 4',     color:'#7A2800',bg:'#FDEAEA'};
  }
  var idxCard=
    '<div style="background:'+idxData.bg+';border:1.5px solid '+idxData.color+'33;border-radius:var(--r14);padding:15px 17px;display:flex;align-items:center;gap:14px;">'+
      '<div style="width:52px;height:52px;border-radius:12px;background:'+idxData.color+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>'+
      '</div>'+
      '<div style="flex:1;">'+
        '<p style="font-size:10px;font-weight:800;color:'+idxData.color+';letter-spacing:.06em;margin-bottom:5px;">'+idxData.label+'</p>'+
        '<p style="font-size:18px;font-weight:900;color:'+idxData.color+';margin-bottom:5px;line-height:1.2;">'+idxData.val+'</p>'+
        '<p style="font-size:11px;color:'+idxData.color+'CC;line-height:1.55;">'+idxData.note+'</p>'+
      '</div>'+
    '</div>';

  /* med note */
  var mNote='';
  if(ageA===0&&answers['q_young_use']===2)mNote='<div class="amb-note"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A5200" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><p style="font-size:12px;color:var(--amber);line-height:1.65;font-weight:600;">يُنصح بفحص شامل لدى طبيب عيون لتأكيد التشخيص وإخراج وصفة دقيقة في هذا السن.</p></div>';
  else if(ageA===2)mNote='<div class="amb-note"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A5200" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p style="font-size:12px;color:var(--amber);line-height:1.65;font-weight:600;">فحص دوري كل ٦-١٢ شهراً مهم في هذا السن. عدسات البروجريسف ستكون متاحة قريباً.</p></div>';

  /* summary */
  var sumH=Object.keys(answers).map(function(qId){
    var aIdx=answers[qId];var q=Q[qId];if(!q)return'';
    var op=q.opts[aIdx];if(!op)return'';
    return'<div class="sum-item"><div class="sum-dot"></div>'+op.t+'</div>';
  }).join('');

  var p=document.createElement('div');
  p.className='pnl';p.setAttribute('data-qid','_result');
  /* store idxData.val for WA message */
  p.setAttribute('data-idx',idxData.val);
  p.innerHTML=
    '<div class="hdr">'+
      '<div class="hdr-back" onclick="goBack()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EFE9C8" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>'+
      LHDR+
      '<span class="hdr-step">النتيجة</span>'+
    '</div>'+
    '<div class="res-hero">'+
      '<p class="res-top">✦ العدسة الموصى بها لك</p>'+
      brLine+
      '<p class="res-nm">'+pL.nm+'</p>'+
      '<p class="res-sb">'+pL.sb+'</p>'+
      '<div class="res-tags">'+pL.tg.map(function(t){return'<span class="rtag">'+t+'</span>';}).join('')+'</div>'+
    '</div>'+
    '<div class="res-body">'+
      idxCard+
      '<div class="inf-card"><p class="inf-lbl">لماذا هذه العدسة؟</p><p class="inf-txt">'+pL.d+'</p></div>'+
      mNote+
      '<div class="alt-row"><div class="alt-ico"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9A9A9A" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><p class="alt-l">بديل موصى به أيضاً</p><p class="alt-n">'+aL.nm+'</p></div></div>'+
      '<div class="sum-card"><p class="sum-l">ملخص احتياجاتك</p><div class="sum-items">'+sumH+'</div></div>'+
      '<button class="btn-wa" onclick="openWA(\''+pK+'\',\''+aK+'\',\''+brKey+'\',\''+idxData.val+'\')">'+
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.125.558 4.122 1.532 5.856L0 24l6.335-1.508A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.6a9.6 9.6 0 01-4.9-1.341l-.351-.208-3.761.895.928-3.656-.228-.375A9.6 9.6 0 1121.6 12 9.611 9.611 0 0112 21.6z"/></svg>'+
        'استفسر عن العدسة عبر واتساب'+
      '</button>'+
      '<button class="btn-rst" onclick="restartAll()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>إعادة التشخيص من البداية</button>'+
    '</div>';

  pushPnl(p,'_result');
}

/* ══════════════════════════════════
   WHATSAPP
══════════════════════════════════ */
function openWA(pK,aK,brKey,idxVal){
  var p=L[pK],a=L[aK],br=BRANDS[brKey]||BRANDS.unk;
  var tags=p.tg.join(' | ');
  var lines=Object.keys(answers).map(function(qId){
    var aIdx=answers[qId];var q=Q[qId];if(!q)return'';
    var op=q.opts[aIdx];return op?'• '+op.t:'';
  }).filter(Boolean).join('\n');
  var brLine=brKey!=='unk'?'\n🏷️ *الماركة الحالية:* '+br.nm:'';
  var msg='مرحباً 👋 من ae optics\n\nأكملت تشخيص العدسة ودي نتيجتي:\n\n'+
    '⭐ *العدسة الموصى بها:* '+p.nm+'\n'+
    '🔬 *معامل الانكسار:* '+idxVal+'\n'+
    'الميزات: '+tags+brLine+'\n\n'+
    '📋 *ملخص احتياجاتي:*\n'+lines+'\n\n'+
    '💡 *البديل المناسب:* '+a.nm+'\n\n'+
    'ممكن تساعدوني في تجهيزها؟ 🙏';
  window.open('https://wa.me/'+PHONE+'?text='+encodeURIComponent(msg),'_blank');
}

/* ══════════════════════════════════
   RESTART
══════════════════════════════════ */
function restartAll(){
  navStack=[];answers={};scores={};stepNum=0;
  var pi=document.getElementById('pi');
  while(pi.children.length>1)pi.removeChild(pi.lastChild);
  pi.style.transition='none';
  pi.style.transform='translateX(0)';
  navStack.push({el:pi.children[0],qId:'_welcome'});
  setTimeout(function(){pi.style.transition='';},50);
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
(function(){
  var pi=document.getElementById('pi');
  var w=mkWelcome();
  pi.appendChild(w);
  navStack.push({el:w,qId:'_welcome'});
})();
</script>
