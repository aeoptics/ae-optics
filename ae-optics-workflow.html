<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ae optics — مساعد العدسات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --brand:#2D2D2D;
  --cream:#EFE9C8;--cream2:#F7F4E8;--cream3:#C8C09A;
  --bg:#F5F4F0;--card:#FFFFFF;--bdr:#E4E1D6;
  --t1:#1A1A1A;--t2:#4A4A4A;--t3:#8A8A8A;
  --green:#1D9E75;--glt:#E1F5EE;
  --amber:#7A4800;--alt:#FFF4DC;--abdr:#F5D090;
  --wa:#25D366;
  --r14:14px;--r10:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Cairo',sans-serif;background:var(--brand);}

#po{width:100%;height:100vh;overflow:hidden;position:relative;}
#pi{display:flex;height:100%;direction:ltr;transition:transform .4s cubic-bezier(.4,0,.2,1);will-change:transform;}

.pnl{min-width:100vw;width:100vw;height:100vh;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;background:var(--bg);direction:rtl;-webkit-overflow-scrolling:touch;}
.pnl-dk{background:var(--brand);}

.hdr{background:var(--brand);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0;direction:rtl;border-bottom:1px solid rgba(255,255,255,.06);}
.hdr-back{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s;}
.hdr-back:active{background:rgba(255,255,255,.16);}
.hdr-step{font-size:11px;font-weight:700;color:rgba(255,255,255,.38);letter-spacing:.04em;}

.w-in{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
.w-tag{font-size:10px;font-weight:800;letter-spacing:.16em;color:var(--cream3);text-transform:uppercase;margin-bottom:14px;}
.w-ttl{font-size:24px;font-weight:900;color:var(--cream);line-height:1.4;margin-bottom:10px;}
.w-sub{font-size:13px;color:rgba(239,233,200,.46);line-height:1.8;margin-bottom:28px;max-width:280px;}
.w-feats{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
.w-feat{display:flex;align-items:center;gap:5px;background:rgba(239,233,200,.09);border:1px solid rgba(239,233,200,.12);border-radius:20px;padding:5px 11px;font-size:10.5px;color:rgba(239,233,200,.62);font-weight:600;}
.btn-start{width:100%;max-width:260px;padding:16px;border-radius:var(--r14);border:none;background:var(--cream);color:var(--brand);font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s,background .12s;}
.btn-start:active{transform:scale(.97);background:var(--cream2);}

.q-bd{flex:1;display:flex;flex-direction:column;padding:16px 15px 28px;}
.q-prog{margin-bottom:16px;}
.q-pr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.q-pr-lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.04em;}
.q-pr-pct{font-size:11px;font-weight:800;color:var(--green);}
.q-pr-bar{height:3px;background:var(--bdr);border-radius:3px;overflow:hidden;}
.q-pr-fill{height:100%;background:var(--green);border-radius:3px;transition:width .5s ease;}
.q-chip{display:inline-block;font-size:10px;font-weight:800;background:var(--cream2);color:var(--brand);padding:4px 10px;border-radius:20px;letter-spacing:.05em;margin-bottom:9px;}
.q-txt{font-size:16px;font-weight:800;color:var(--t1);line-height:1.45;margin-bottom:5px;}
.q-sub{font-size:12px;color:var(--t3);line-height:1.65;margin-bottom:16px;}
.med-box{background:var(--alt);border:1px solid var(--abdr);border-radius:var(--r10);padding:10px 12px;margin-top:12px;display:flex;gap:8px;align-items:flex-start;}
.med-txt{font-size:11.5px;color:var(--amber);line-height:1.65;font-weight:600;}

.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:center;gap:10px;padding:12px 13px;border:1.5px solid var(--bdr);background:var(--card);border-radius:var(--r14);cursor:pointer;text-align:right;transition:border-color .12s,background .12s,transform .1s;position:relative;}
.opt:active{transform:scale(.985);}
.opt.sel{border-color:var(--green);background:var(--glt);}
.opt.dis{opacity:.35;pointer-events:none;}
.oi{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.ob{flex:1;}
.ot{font-size:13px;font-weight:700;color:var(--t1);display:block;line-height:1.3;}
.oh{font-size:11px;color:var(--t3);display:block;margin-top:2px;line-height:1.45;}
.ock{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.opt.sel .ock{background:var(--green);border-color:var(--green);}
.ockd{width:6px;height:6px;border-radius:50%;background:#fff;opacity:0;transform:scale(0);transition:all .1s;}
.opt.sel .ockd{opacity:1;transform:scale(1);}
.soon{position:absolute;top:-1px;left:-1px;background:var(--alt);color:var(--amber);font-size:9px;font-weight:800;padding:3px 7px;border-radius:var(--r14) 0 var(--r10) 0;}

.brd-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.brd-opt{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:13px 9px;border:1.5px solid var(--bdr);background:var(--card);border-radius:var(--r14);cursor:pointer;text-align:center;transition:border-color .12s,background .12s,transform .1s;gap:6px;}
.brd-opt:active{transform:scale(.97);}
.brd-opt.sel{border-color:var(--green);background:var(--glt);}
.brd-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;letter-spacing:-.4px;}
.brd-nm{font-size:12px;font-weight:700;color:var(--t1);line-height:1.2;}
.brd-sb{font-size:10px;color:var(--t3);margin-top:-2px;}

.res-hero{background:var(--brand);padding:20px 18px 24px;flex-shrink:0;}
.res-top{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--cream3);text-transform:uppercase;margin-bottom:8px;}
.res-type-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(239,233,200,.12);border:1px solid rgba(239,233,200,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(239,233,200,.72);font-weight:700;margin-bottom:9px;}
.res-nm{font-size:20px;font-weight:900;color:var(--cream);line-height:1.3;margin-bottom:3px;}
.res-sb{font-size:12px;color:rgba(239,233,200,.44);margin-bottom:12px;}
.res-tags{display:flex;flex-wrap:wrap;gap:5px;}
.rtag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;background:rgba(239,233,200,.12);color:var(--cream);border:1px solid rgba(239,233,200,.17);}
.res-br-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(239,233,200,.09);border:1px solid rgba(239,233,200,.15);border-radius:20px;padding:3px 10px;font-size:10.5px;color:rgba(239,233,200,.6);font-weight:600;margin-bottom:7px;}

.res-body{padding:14px 15px 28px;display:flex;flex-direction:column;gap:12px;}
.inf-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r14);padding:14px 15px;}
.inf-lbl{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.inf-txt{font-size:13px;color:var(--t2);line-height:1.85;}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.feat-item{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r10);padding:10px 11px;}
.feat-ico{font-size:16px;margin-bottom:3px;}
.feat-ttl{font-size:11.5px;font-weight:700;color:var(--t1);}
.feat-sub{font-size:10.5px;color:var(--t3);line-height:1.4;margin-top:1px;}

.alt-card{background:var(--card);border:1.5px dashed var(--bdr);border-radius:var(--r14);padding:13px 15px;}
.alt-inner{display:flex;align-items:center;gap:10px;margin-top:4px;}
.alt-ico{font-size:22px;}
.alt-nm{font-size:13px;font-weight:700;color:var(--t1);}
.alt-sb{font-size:11.5px;color:var(--t3);margin-top:2px;}

.sum-card{background:var(--cream2);border:1px solid var(--bdr);border-radius:var(--r14);padding:13px 15px;}
.sum-lbl{font-size:10px;font-weight:800;color:var(--brand);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}
.sum-items{display:flex;flex-direction:column;gap:5px;}
.sum-row{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--t2);line-height:1.55;}
.sum-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;}
.sum-key{color:var(--t3);font-size:11px;flex-shrink:0;min-width:72px;}

.med-sum{background:var(--alt);border:1px solid var(--abdr);border-radius:var(--r14);padding:13px 15px;}
.med-sum-lbl{font-size:10px;font-weight:800;color:var(--amber);letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.med-sum-row{display:flex;gap:7px;font-size:12px;color:var(--amber);line-height:1.6;margin-bottom:4px;}
.med-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:6px;}

.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:var(--r14);border:none;background:var(--wa);color:#fff;font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:transform .12s;}
.btn-wa:active{transform:scale(.97);}
.btn-rst{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:var(--r10);border:1.5px solid var(--bdr);background:transparent;font-family:'Cairo',sans-serif;font-size:12.5px;font-weight:600;color:var(--t3);cursor:pointer;margin-top:4px;}
.btn-rst:active{background:var(--bdr);}
</style>
</head>

/* ═══════════════════════════
   SLIDE ENGINE
═══════════════════════════ */
function slideTo(i){document.getElementById('pi').style.transform='translateX('+(-i*100)+'vw)';}
function pushPnl(el,qId){
  var pi=document.getElementById('pi');
  pi.appendChild(el);navStack.push({el:el,qId:qId});
  slideTo(navStack.length-1);
  setTimeout(function(){el.scrollTop=0;},420);
}
function goBack(){
  if(navStack.length<=1)return;
  var cur=navStack.pop();var qId=cur.qId;
  if(qId&&Q[qId]&&answers[qId]!==undefined){
    var op=Q[qId].opts[answers[qId]];
    if(op&&op.sc)Object.keys(op.sc).forEach(function(k){scores[k]=Math.max(0,(scores[k]||0)-op.sc[k]);});
    delete answers[qId];if(stepNum>0)stepNum--;
  }
  slideTo(navStack.length-1);
  setTimeout(function(){if(cur.el.parentNode)cur.el.parentNode.removeChild(cur.el);},450);
}

/* ═══════════════════════════
   PICKS
═══════════════════════════ */
function pickOpt(qId,oi,el){
  var q=Q[qId];var opt=q.opts[oi];
  el.parentElement.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  if(answers[qId]!==undefined){var old=q.opts[answers[qId]];if(old&&old.sc)Object.keys(old.sc).forEach(function(k){scores[k]=Math.max(0,(scores[k]||0)-old.sc[k]);});}
  answers[qId]=oi;
  if(opt.sc)Object.keys(opt.sc).forEach(function(k){scores[k]=(scores[k]||0)+opt.sc[k];});
  if(opt.med){var ne=document.getElementById('mn_'+qId);if(ne)ne.innerHTML='<div class="med-box">'+warnIco()+'<p class="med-txt">'+opt.med+'</p></div>';}
  setTimeout(function(){
    if(opt.nx==='result')mkResult();
    else if(opt.nx){pushPnl(mkQPnl(opt.nx),opt.nx);}
  },360);
}
function pickBrand(qId,oi,el){
  var q=Q[qId];var opt=q.opts[oi];
  el.parentElement.querySelectorAll('.brd-opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  if(answers[qId]!==undefined){var old=q.opts[answers[qId]];if(old&&old.sc)Object.keys(old.sc).forEach(function(k){scores[k]=Math.max(0,(scores[k]||0)-old.sc[k]);});}
  answers[qId]=oi;
  if(opt.sc)Object.keys(opt.sc).forEach(function(k){scores[k]=(scores[k]||0)+opt.sc[k];});
  setTimeout(function(){
    if(opt.nx==='result')mkResult();
    else if(opt.nx)pushPnl(mkQPnl(opt.nx),opt.nx);
  },340);
}

function startFunnel(){
  navStack=[];answers={};scores={};stepNum=0;
  var pi=document.getElementById('pi');
  while(pi.children.length>1)pi.removeChild(pi.lastChild);
  navStack.push({el:pi.children[0],qId:'_welcome'});
  pushPnl(mkQPnl('q_age'),'q_age');
}
function restartAll(){
  navStack=[];answers={};scores={};stepNum=0;
  var pi=document.getElementById('pi');
  while(pi.children.length>1)pi.removeChild(pi.lastChild);
  pi.style.transition='none';pi.style.transform='translateX(0)';
  navStack.push({el:pi.children[0],qId:'_welcome'});
  setTimeout(function(){pi.style.transition='';},50);
}

/* ═══════════════════════════
   RESULT
═══════════════════════════ */
function mkResult(){
  var ageA        = answers['q_age'];        /* 0=<40, 1=40+ */
  var degA        = answers['q_degree'];     /* 0=<2, 1=2-5, 2=>5, 3=لاأعرف */
  var youngUseA   = answers['q_young_use'];  /* 2 = قريب */
  var seniorUseA  = answers['q_senior_use'];

  /* ── MEDICAL OVERRIDES ──
     Hyperopia/Presbyopia separation:
     • تحت 40 لا يصل لعدسة قراءة كبار أبداً */
  if(ageA===0){ scores['read']=0; }

  /* 40+ لم يختر صعوبة قراءة → read أقل */
  if(ageA===1 && seniorUseA!==undefined && seniorUseA!==2){
    scores['read']=Math.max(0,(scores['read']||0)-2);
  }

  /* العدسات الرفيعة حسب النطاقات الصحيحة:
     < 2  → لا 1.67 ولا 1.74
     2-5  → 1.67 فقط، صفّر 1.74
     > 5  → 1.74 الأولى، 1.67 احتياطي */
  if(degA===0){scores['hi67']=0;scores['hi74']=0;}
  if(degA===1){scores['hi74']=0;}
  if(degA===2){scores['hi74']=(scores['hi74']||0)+2;}

  var keys=Object.keys(LENS).sort(function(a,b){return(scores[b]||0)-(scores[a]||0);});
  var pK=keys[0],aK=keys[1];
  var pL=LENS[pK],aL=LENS[aK];

  /* الماركة */
  var brA=answers['q_brand'];
  var brOpt=Q['q_brand'].opts[brA];
  var brKey=brOpt?brOpt.bk:'unk';
  var br=BRANDS[brKey]||BRANDS.unk;
  var brLine=brKey!=='unk'
    ?'<div class="res-br-pill"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>ماركتك: '+br.nm+'</div>':'' ;

  /* ملاحظات طبية */
  var meds=[];
  if(pL.med)meds.push(pL.med);
  if(ageA===0&&youngUseA===2)
    meds.push('صعوبة القراءة القريبة تحت ٤٠ = طول نظر (Hyperopia) وليس بريزبيوبيا — سينجل فيجن عادي كافٍ تماماً.');
  if(ageA===1)
    meds.push('فحص دوري كل ٦-١٢ شهراً مهم بعد ٤٠ سنة. عدسات البروجريسف ستكون متاحة قريباً.');
  if(degA===2)
    meds.push('فوق درجة ٥: عدسة 1.74 الأرق والأخف — الفارق في المظهر والراحة ملموس جداً مقارنة بأي مؤشر آخر.');

  var medH=meds.length?
    '<div class="med-sum">'+
      '<p class="med-sum-lbl">'+infoIco()+' ملاحظات طبية</p>'+
      meds.map(function(n){return'<div class="med-sum-row"><div class="med-dot"></div><span>'+n+'</span></div>';}).join('')+
    '</div>':'';

  /* ملخص الإجابات */
  var qLbls={q_age:'السن',q_young_use:'الاحتياج',q_senior_use:'الاحتياج',q_near_young:'القراءة',q_near_senior:'القراءة',q_screen:'الشاشات',q_lifestyle:'نمط الحياة',q_glare:'الشمس',q_degree:'درجة النظر',q_brand:'الماركة'};
  var sumH='';
  Object.keys(answers).forEach(function(qId){
    var aIdx=answers[qId];var q2=Q[qId];if(!q2)return;
    var op=q2.opts[aIdx];if(!op)return;
    sumH+='<div class="sum-row"><div class="sum-dot"></div><span class="sum-key">'+(qLbls[qId]||q2.cat)+'</span><span>'+op.t+'</span></div>';
  });

  var featH='<div class="feat-grid">'+
    pL.feats.map(function(f){return'<div class="feat-item"><div class="feat-ico">'+f.ico+'</div><div class="feat-ttl">'+f.ttl+'</div><div class="feat-sub">'+f.sub+'</div></div>';}).join('')+
  '</div>';

  var p=document.createElement('div');p.className='pnl';
  p.innerHTML='<div class="hdr">'+
      '<div class="hdr-back" onclick="goBack()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EFE9C8" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>'+
      LHDR+'<span class="hdr-step">النتيجة</span>'+
    '</div>'+
    '<div class="res-hero">'+
      '<p class="res-top">✦ العدسة الموصى بها لك</p>'+
      brLine+
      '<div class="res-type-badge">'+pL.emoji+' '+pL.type+'</div>'+
      '<p class="res-nm">'+pL.nm+'</p>'+
      '<p class="res-sb">'+pL.sb+'</p>'+
      '<div class="res-tags">'+pL.tg.map(function(t){return'<span class="rtag">'+t+'</span>';}).join('')+'</div>'+
    '</div>'+
    '<div class="res-body">'+
      '<div class="inf-card"><p class="inf-lbl">لماذا هذه العدسة؟</p><p class="inf-txt">'+pL.d+'</p></div>'+
      '<div class="inf-card"><p class="inf-lbl">مميزات العدسة</p>'+featH+'</div>'+
      medH+
      '<div class="alt-card">'+
        '<p class="inf-lbl">بديل موصى به أيضاً</p>'+
        '<div class="alt-inner"><div class="alt-ico">'+aL.emoji+'</div>'+
        '<div><div class="alt-nm">'+aL.nm+'</div><div class="alt-sb">'+aL.sb+'</div></div></div>'+
      '</div>'+
      '<div class="sum-card"><p class="sum-lbl">ملخص احتياجاتك</p><div class="sum-items">'+sumH+'</div></div>'+
      '<button class="btn-wa" onclick="openWA(\''+pK+'\',\''+aK+'\',\''+brKey+'\')">'+
        '<svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.125.558 4.122 1.532 5.856L0 24l6.335-1.508A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>'+
        'استفسر عن العدسة عبر واتساب'+
      '</button>'+
      '<button class="btn-rst" onclick="restartAll()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>إعادة التشخيص من البداية</button>'+
    '</div>';

  pushPnl(p,'_result');
}

/* ═══════════════════════════
   WHATSAPP
═══════════════════════════ */
function openWA(pK,aK,brKey){
  var p=LENS[pK],a=LENS[aK],br=BRANDS[brKey]||BRANDS.unk;
  var qLbls={q_age:'السن',q_young_use:'الاحتياج',q_senior_use:'الاحتياج',q_near_young:'القراءة',q_near_senior:'القراءة',q_screen:'الشاشات',q_lifestyle:'نمط الحياة',q_glare:'الشمس',q_degree:'درجة النظر',q_brand:'الماركة'};
  var lines=Object.keys(answers).map(function(qId){
    var aIdx=answers[qId];var q2=Q[qId];if(!q2)return'';
    var op=q2.opts[aIdx];if(!op)return'';
    return'• '+(qLbls[qId]||q2.cat)+': '+op.t;
  }).filter(Boolean).join('\n');
  var brLine=brKey!=='unk'?'\n🏷️ *الماركة:* '+br.nm:'';
  var msg='مرحباً 👋 من ae optics\n\nأكملت تشخيص العدسة:\n\n'+
    '⭐ *العدسة الموصى بها:*\n'+p.emoji+' '+p.nm+'\nالنوع: '+p.type+'\nالمميزات: '+p.tg.join(' | ')+brLine+'\n\n'+
    '📋 *ملخص احتياجاتي:*\n'+lines+'\n\n'+
    '💡 *البديل:* '+a.emoji+' '+a.nm+'\n\nممكن تساعدوني في تجهيزها؟ 🙏';
  window.open('https://wa.me/'+PHONE+'?text='+encodeURIComponent(msg),'_blank');
}
